name: myapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1


environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^8.1.0
  http: ^1.5.0
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: 0.20.2
  camera: ^0.12.0+1   # ✅ added
  permission_handler: ^12.0.1  # ✅ added
  speech_to_text: 7.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_local_notifications: ^21.0.0
  file_picker: ^11.0.2 
  url_launcher: ^6.2.5
  open_filex: ^4.3.4
  mime: ^2.0.0

  cupertino_icons: ^1.0.8
  # Backend Integration
  appwrite: any
  flutter_dotenv: any
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  minio: ^3.5.8
  share_plus: ^12.0.2
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.5
  crypto: ^3.0.3
  flutter_contacts: ^1.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Environment Variables
  assets:
    - .env
    - assets/body_shapes/
    - assets/styles/
    - assets/shop/
    - assets/images/
    - assets/lang/
    - assets/style_assets/
    - assets/style_assets/style_assets_manifest.json
    - assets/style_assets/accessories/earrings/
    - assets/style_assets/accessories/necklaces/
    - assets/style_assets/accessories/bracelets/
    - assets/style_assets/accessories/sets/
    - assets/style_assets/accessories/bags/
    - assets/style_assets/accessories/phone_slings/