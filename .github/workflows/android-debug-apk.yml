name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env
        env:
          AHVI_ENV_FILE: ${{ secrets.AHVI_ENV_FILE }}
        run: |
          if [ -z "$AHVI_ENV_FILE" ]; then
            touch .env
          else
            printf "%s" "$AHVI_ENV_FILE" > .env
          fi
      - name: Pub get
        run: flutter pub get

      - name: Build ARM64 debug APK
        run: flutter build apk --debug --target-platform android-arm64 --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AHVI-debug-arm64-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
